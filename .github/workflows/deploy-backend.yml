name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "docker-compose.yml"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "pyproject.toml"
      - "infra/**"
      - "scripts/control-node-deploy.sh"
      - "scripts/bootstrap-control-node.sh"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    # Self-hosted runner on the control node — see scripts/install-github-runner.sh
    runs-on: [self-hosted, linux, homecloud]
    environment: production
    steps:
      - name: Deploy stack
        run: cd ~/homecloud && ./scripts/control-node-deploy.sh
